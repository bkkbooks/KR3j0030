body:
  text: 近事會元卷四宋李上交撰霓裳羽衣曲唐野史云明皇開元中道人葉法善引上入月宫時秋上苦淒冷不能久留回於天半尚間仙樂及歸但記其半曲遂笛中寫之會西京都督楊敬述進婆羅門曲與其聲調相符遂以月中所聞為之散序因敬述所進為曲身名霓裳羽衣曲也又楊妃外傳云天寶四載七月於鳯凰園册女道士楊氏為貴妃進見之日奏霓裳羽衣曲注云明皇三鄉望女几山所作也又引劉禹錫詩云三鄉陌上望仙山歸作霓裳羽衣曲又小説云術士羅公逺導明皇入月宫聞之尤甚怪誕不足為證上交嘗聞明皇洞曉音律必欲神其曲謂得於天上也或夢寐所成亦非異事若云形體升天殆欺人也女几回而作近之矣今又按樂苑云霓裳羽衣曲開元西涼府節度使楊敬述進在越調中又樂苑云婆羅門曲改霓裳羽衣曲入大乞食調今之大食越調聲相近唯高一均是二調俱可行之皆屬商也婆羅門曲大乞食調越調雙調今時樂工盡知之其散序不復聞焉近年樂工穿鑿不明越與大食俱屬商聲但見胡曲有仲吕商即林鍾商也便就其調草為八拍曲破殊無和會諒其曲必大也自唐憲宗時猶奏此曲今不傳者有以巢賊之後泯然也無如白居易歌詩可證耳白詩云開元遺曲自淒涼况近秋天調見商又和元稹詩云我昔元和侍憲皇曽陪內宴入昭陽千歌萬舞不可數就中最愛霓裳舞舞時寒食秋風天玉勾欄下香案前案前舞者顔如玉不著人間俗衣服虹霓霞帔步搖冠花鈿瓔纍佩珊珊娉婷似不任羅綺願聽樂懸行復止磬簫箏笛競相攙擊擫吹彈聲迤邐法曲之初衆樂不齊唯金石絲竹次第聲發霓裳序初亦如此散序六奏未動衣陽臺宿雲慵不飛散序六遍無拍故不舞之野史云此是明皇所得之聲分為六序也中序擘裂初入拍秋竹竿裂春水拆中序初有拍亦名拍序此後乃進婆羅門曲也飄然轉旋回雪輕嫣然縱送遊龍驚煙娥斂略不勝態風袖低昻如有情上元點鬟招萼緑王母揮袖别飛瓊繁音急節十二遍跳珠撼玉何鏗錚十二遍而終翔鸞舞了卻收趐唳鶴曲終長引聲凡曲將終皆聲拍促速為霓裳之末長引一聲也君不見我歌云驚破霓裳羽衣曲又不見我詩云曲愛霓裳未拍時由來能事皆有主楊氏創聲君造譜楊氏謂敬述創歌今微之寄譜與樂天也胡渭州伊州樂譜録云唐明皇天寶中西涼節度使蓋嘉運進涼州新涼州唐明皇開元六年西涼州都督郭知運進又有新涼州並在宫調上宫竊詳七宫有八涼州內正宫别有小涼州亦曰碎宫涼州其慢遍中來七宫涼州中美聲聚而為之此有似新涼州也又鄭􅙶傳信記云初郭知運進此曲上召諸王便殿聽之曲終寧王不樂對曰此曲雖佳臣有間焉夫音者始於宫商成於角徴羽莫不根襲於宫商也斯曲宫雜而少徴商亂而加暴宫君商臣也宫不勝則君勢卑商有餘則臣事僭卑則逼下僭則犯上落於忽微形於音聲播之於歌詠見之於人事臣恐有播越之禍悖迫之患莫不兆於斯曲也上默然後有安史之亂西涼州曲唐幽間鼓吹云元載子名伯和勢傾中外時閩帥寄樂伎十人僅半嵗無因得進伺其門下彈琵琶人康崑崙得通伯和一試之盡遺崑崙矣先有和尚段善本者自製西涼州崑崙求之不與至是以樂伎半贈之乃肯傳焉今道調涼州是也楊栁枝唐穆宗時白居易長慶集云楊栁枝洛下小新聲也小伎有善歌者可聽故試之云小伎攜桃葉新聲踏栁枝口動櫻桃破鬟低翡翠垂又别栁枝詩云兩枝楊栁小樓中嫋娜多年伴醉翁上交按抒情詩集述白居易有數伎樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊栁小蠻腰居易年既高邁小蠻方豐艷因為栁枝詞以托意曰一樹春風萬萬枝嫩於金色軟於絲永豐坊裏東南角盡日無人屬阿誰及宣宗朝國樂工唱是詞上問誰詞永豐在何處左右對遂因東使命取永豐栁二枝植於禁中居易感上知名又為一章末句云定知今夜天文裏栁宿光中添兩星中和樂唐德宗貞元十四年二月一日中和節以雨雪改於二月七日宴羣臣因奏上所製中和樂曲也傾杯樂唐太宗貞觀初內宴長孫無忌造此曲又樂府雜録云唐宣宗善吹蘆管自製此曲有數拍不均上初捻管令俳兒辛骨朏拍不中其節上瞋目顧之朏憂一日而卒上交詳此二説恐先者是宫調後來宣宗轉於他調製之也又明皇開元中亦用此曲每日輪馬三十匹舞之道調子唐懿宗命樂工史敬約吹蘆管初弄道調上誤謂曲拍之敬約隨其拍轉成此曲以隱其誤也康老子樂府録云唐富人唐康老子落托好與樂工遊處家計蕩盡而卒樂府嗟之遂製此曲離别難唐則天時士人陷寃獄有妻配入掖庭其本夫善吹蘆管乃撰此曲以寄哀情始名二郎神蓋取良人行第也畏人知遂三易其名亦曰悲切子終號怨回鶻如意娘樂府雜録云唐則天撰之君臣相遇樂樂府録云唐明皇天寶中命談淨眼等撰雨淋鈴樂府雜録云唐明皇自蜀反正樂人張野狐所製亦曰還京樂夜半樂樂府雜録云唐明皇入平內難正半夜斬長樂門關領兵入宫剪逆人後造此曲望江南樂府雜録云始朱崖李太尉鎮浙西日為亡妓謝秋娘所撰本名謝秋娘後改此名亦曰夢江南荔枝香唐甘澤謠云天寶四載六月一日明皇驪山駐蹕會貴妃誕辰上命小部音聲樂人長生殿奏新曲未有名會南海貢荔枝因名其曲為荔枝香奉聖樂曲唐盧氏雜説云韋皋鎮西川進之也春鶯囀教坊録云唐高宗曉聲律因風葉鳥聲晨坐聞之命樂工白鳴達寫之遂有此曲凡箜篌大絃未嘗鼓唯作此曲入鳥聲即彈之箏則移西柱向上鳥聲畢入急復移如舊也內教坊雲韶府唐高祖武德已來置於禁中以按習雅樂以中官一人充使則天改為雲韶府神龍中復為教坊大唐雅樂唐太宗貞觀二年太常少卿祖孝孫斟酌南北樂考以古音作為大唐雅樂以十二律各順其月旋相為宫制十二和之樂合三十一曲八十四調改法曲為仙韶曲仙韶院唐文宗開成三年四改法曲為仙韶曲仍以伶官所居謂之仙韶院左教坊右教坊教坊録云唐明皇開元末西京右教坊在光宅坊左教坊在延正坊右善歌左善舞蓋相習也宜春院十家三國教坊録云女妓入宜春院謂之內人亦曰前頭人謂在上前也骨肉得居教坊謂之內人家有請俸其得幸者謂之十家故鄭嵎津陽門詩云十家三國增光輝是也家雖多亦以十家呼之三國謂秦韓虢楊氏三夫人也雲韶院教坊記云宜春人為戲則以雲韶添之雲韶為宫蓋遼柘枝達摩之屬謂之健舞七德舞破陳樂唐太宗貞觀元年宴日奏秦王破陳之曲蓋太宗在籓為秦王時士庶軍人相與作之被甲持戟象戰事上嘆曰豈意今日登於雅樂朕雖以武功定天下終以文德綏海內遂令虞世南等改製歌詞更名七德舞舞者至一百二十人胡旋舞唐明皇天寶六載安祿山為上所寵加范陽節度使先是康居國貢胡旋舞女爾後安祿山與楊妃俱言其藝傳之者不述舞態上交按白樂天歌詞云胡旋舞手應弦足應鼓絃一聲雙袖舞左右轉不知疲千周萬匝無己時又云胡旋女出康居徒勞東來萬里餘中原自有能胡旋鬭妙爭能爾不如中有太真外祿山二人最是能胡旋祿山胡旋迷君眼兵過黃河疑未反太真胡旋感君心死棄馬嵬念更深從兹地軸天維轉五十年來制不禁舞馬唐明皇開元中三宴日諸樂戲外有舞馬三十匹為傾杯樂曲奮首鼓尾縱橫應節又施三層寶牀乘馬而上抃轉如飛後安祿山亦將數匹而歸私習之其後田承嗣代祿山舞馬尚存者一旦於櫪上聞鼓聲頓挫以舞之廏人惡之舉篲以擊焉其馬尚謂怒其未妍妙因更奮擊宛轉曲盡其態厮役告承嗣以為妖遂戮之而舞馬絶梨園弟子唐明皇開元二十年以聽政之暇詔太常樂工弟子三百人為絲竹之戲音響齊發有一聲誤上必覺為正之號皇帝弟子又云梨園弟子以置近院於林苑之梨園也坐部立部唐高祖初登極後燕享因隋舊制用九部之樂其後分為立坐二部雅歌雜胡夷音法曲唐明皇開元二十五年太常卿韋縚令博士韋逌直太樂尚沖樂正沈元福郊社令陳虔申懷操等銓敘前後所用樂章為五奏付太樂習之時太常舊相傳有宫商角徴羽宴樂五調歌各一奏縚又令元成更相整比為七卷又自開元已來歌者雜用胡夷里巷之曲其元成所集者工人多不能曉相傳謂之法曲也曲破唐傳載云天寶樂章多以邉地為名若涼州甘州伊州之類是焉其曲之遍擊聲處名入破後其地盡為西畨所沒破其兆也羯鼓唐羯鼓録云此樂出外夷以戎羯鼓故也其音主太簇一均在都曇鼓答臘鼓之下都曇狀腰而小者臘取楷鼓也雞樓鼓之上搊琵琶唐國史纂要異云貞觀中彈琵琶裴洛兒私撥用手今日搊琵琶也古琵琶酉陽雜俎云琵琶用鵾雞弦開元中段師名善本能彈琵琶用皮弦賀懷智破撥彈之不能成聲琵琶名傳載云唐時漢中王瑀見康崑崙彈之曰琵聲多琶聲少亦未可彈五十四弦大弦也自上而下謂之琵自下而上謂之琶賀老琵琶唐談賓録云賀老名懷智也調啞鐘唐太宗貞觀二年祖孝孫以隋用黃鐘一宫唯叩七鐘餘五鐘虛懸不叩謂之啞鐘遂以旋宫之法皆遍叩之無復虛懸也雜戲弄孔子唐文宗太和六年二月寒食上宴羣臣伶人弄孔子帝曰孔子古今之師安得侮黷亟驅出之潑寒胡戲唐則天神龍二年中宗即位後十一月御洛成樓始觀潑寒胡戲至開元二年禁斷因張説奏也胡人以水相潑於寒月為戲謂之乞寒胡者雍州高祖武德元年改隋京兆郡為雍州也洛州總管府唐高祖武德四年討平王世充改隋河南郡置洛州總管府也神都唐則天神龍元年改東都為神都復東都唐則天神龍元年改神都為東都河南府唐明皇開元二年改洛州為河南府東京唐明皇天寶元年改東都為東京洛陽也東都唐高宗顯慶元年改洛陽宫為東都西京唐明皇天寶元年以京師為西京長安也京兆府唐明皇開元元年改雍州為京兆府西京南京中京唐肅宗至德二載十二月改蜀郡為南京鳯翔為西京西京為中京開封府為東都汴州為開封府東都為西都梁太祖開平元年四月以東都為西都即洛陽也梁都汴梁太祖於唐天祐四年四月登位國號大梁改元天平元年都於汴汴州衛為天寧宫晉高祖天福三年五月中丞張昭逺奏據前代行幸所至皆立宫名遂改汴州衛城門為天寧宫升汴州為東京晉高祖天福三年十月升汴州為東京又改洛陽為西京也新東京諸門名周世宗顯德五年五月改新東京諸門名也總管府為都督府唐高祖武德七年改總管府為都督府也行臺為都督府唐高祖武德九年六月廢陜州道大行臺置洛州都督府廢益州大行臺置益州大都督府十道唐太宗貞觀元年併省隋之州郡分為十道分天下為十五道唐高宗時平高麗百濟遼海已東皆為州縣俄而復叛不入提封景雲二年分天下州縣置二十四都督府以統之議者以權重不便罷之元宗開元二十四年分天下為十五道每道置採訪使檢察非法如漢刺史之職二十四都督府唐睿宗景雲二年依前代故事分二十四都督府至其年七月並停惟揚益并荆四大都督府長史階為三品分五管廣雍為二道唐懿宗咸通三年正月敕廣南分道為五管屬嶺南廣雍二道單于都護府唐高宗麟德元年正月改交雲中都護府為單于都護府官品同大都督府安南都護唐髙宗永隆二年八月改交州為安南都護府築長安羅城汴唐高宗永徽四年十一月築長安羅城和顧百姓四萬一千人三十日畢功作東京羅城周世宗顯德二年四月新作京師羅城郡為州太守為刺史高祖武德元年罷郡置州改太守為刺史也郡為州刺史為太守唐明皇天寶元年改州為郡刺史為太守郡復為州太守復為刺史唐肅宗至德二年十二月詔復舊也瓦橋關為雄州益津關為霸州周世宗顯德六年五月改也蔡州唐代宗寶應元年十月八日改豫州為蔡州避上諱也麟州唐明皇開元九年張説奏置以安黨項升州周世宗顯德五年三月於上元縣置升州福州唐明皇開元十二年改閩州為福州避文相類聲相近也廢麟州唐明皇開元十四年廢麟州清德軍晉高祖天福六年八月改舊檀州為清德軍明州唐明皇開元二十六年分越州置明州五丈河蔡河周世宗顯德六年二月發滑亳丁夫濬五丈河東流於定陶入於濟以通青鄆運路又疏蔡州以通陳潁近事會元卷四
