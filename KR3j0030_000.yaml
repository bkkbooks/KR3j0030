body:
  text: 近事㑹元雜家類二雜考之屬提要臣等謹案近事㑹元五卷宋李上交撰上交贊皇人始末未詳是書成于嘉祐元年前有上交自序陳振孫書録解題曰近事㑹元五卷李上交撰自唐武德至周顯德雜事細務皆紀之錢曽讀書敏求記曰上交退寓鍾陵尋近史及小說雜記之類凡五百事釐為五卷目曰近事㑹元唐史所失記者此多載焉此本末題萬厯壬午元素齊録副本猶明人舊鈔卷數與二家所記合其紀事起訖年月與振孫所言合條數及自序之文亦與曽所言合蓋即原本惟振孫以為皆記雜事細務今觀其書自一卷至三卷首載宫殿之制次載輿服之制次載官制軍制其次亦皆六曹之掌故四卷為樂曲為州郡沿革惟五卷頗載瑣聞然如婦人檐子兜籠線鞾線鞋親迎舉樂障車公主事姑舅公主賜諡山川嶽瀆封號國忌行香上元㸃燈散從親事官處士諡先生律格赦書投匭刑統律令死罪覆奏斷獄禁樂逐旬問罪人表狀書奏制敕及始流沙門島始配衙前安置始貶崖州諸條亦皆有關于典制大抵體例在崔豹古今注髙承事物紀原之間其中如霓裳羽衣曲考證亦極精核不可徒以雜事細務目之振孫殆未詳核其書但見其標題列說如雲仙雜記清異録之式遂漫以為小說歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序儒家者流誠資博洽天下之事故有本原茍道聽之未詳則賓圍而奚解實繁廣記以避無稽嘗謂經籍之淵頗易探討耳目之接或難周知上交以退寓鍾陵靜尋近史及諸小說雜記之類起唐武德而下盡周顯德之前擷細務之所因庶閒談之引據如曰小不足講懵則包羞聊此篇聨無誚叢脞凡五百事釐為五卷曰近事㑹元爾時丙申嘉祐改元長至日也
