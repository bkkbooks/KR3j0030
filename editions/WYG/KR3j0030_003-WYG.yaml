body:
  text: 近事㑹元卷三宋李上交撰雁子軍唐昭宗景福元年朱瑄叛於兖鄆募勇士數百黥雙雁於頰立為雁子都時朱全忠聞之亦選數百人號為落雁都署朱漢賓為軍使故人呼朱落雁夾寨梁太祖開平四年五月發山東民饋糧於潞州以敵後唐數為唐將周徳威掩襲運路頗艱乃於東山口築道連接為栅以通餉道自是梁軍保之謂之夾寨破夾寨梁太祖開平四年乃唐天祐五年也蓋後唐不改年號莊宗率親軍抵寨城以李嗣源李存璋王霸進軍斫燒夾寨為道嗣源壞夾寨梁軍投戈南奔舂磨寨唐僖宗廣明三年六月黄巢與秦宗權合縱兵掠陳許蔡人併骨為食謂之春磨寨蓋碎骨也殿前諸班周世宗顯徳元年自高平之役覩諸軍未甚嚴整遂有退志至其年十月命本朝太宗皇帝一概揀驍健者署為殿前諸班遂有散員指揮内殿直散都頭鐡騎控鶴之號汰去老弱者兵丁指揮為一軍唐明宗長興三年三月以神捷神威廣捷諸軍左右羽林軍分四十指揮每十指揮為一軍置都指揮使一員大將受命唐志云大將出軍征討皆告廟受鉞辭齊太公廟訖不宿於家姑息戎臣唐穆宗馭軍未得其要常云宜姑息戎臣即位之後至長慶詔軍士死王事三周年不得停衣糧先於恒州留使錢内每貫割二百文助軍初傾府庫給賞戎行所獲人至鉅萬非時賜與不可勝紀故軍旅益驕法令益弛戰則不克而國危也監軍有印唐徳宗貞元十一年五月鑄河東監軍印自王定逺始也武官不得轉文官唐僖宗廣明元年六月詔令今後武官不得轉文官所冀轅輪各適其用其内司不在此限南郊賞給唐徳宗貞元六年十一月内南郊禮畢宣赦後立仗將士及諸州共賜十八萬端匹南郊賞給始此出兵名數贊軍定制唐志云凡將帥出行兵滿一萬人已上置長史司馬倉兵胄三參軍五千人已上減司馬諸軍各置使一人五千人已下各置副使一人一萬人已上置營田副使一人每軍各有倉兵胄三參軍其横海高陽唐興恒陽北平等五軍皆本州刺史為使凡鎮皆有使一人副使一人一萬人以上置司馬兵倉胄三參軍五千人以下減司馬凡諸軍鎮每五百人置押官一人千人置總管一人凡諸軍鎮使副已上四年一替總管已下二年一替押官隨軍替百官罷廊食入閣食後唐明宗天成初以亂離之前常參官每日朝退賜食廊下謂之廊食自乾符後經費不足無每日之賜至是遇入閣即賜八館後唐明宗天成四年四月司業張溥請復舊八館以廣生徒按六典監有文學國子太學四門律學書學溥言謬矣聖節獻物及天下賜宴唐明皇開元十七年八月五日上生辰宴百僚於花萼樓百僚表請以八月五日為千秋節王公已下獻鏡及承露嚢天下諸州咸令宴樂休假三日仍編於令聖節賜宴素食唐文宗開成四年八月詔慶成節朕之生辰天下賜宴庶同歡泰不欲屠宰非信尚空門恐中外臣庶不諭朕意廣置齋筵自今宴㑹蔬食任陳脯醢罷元㑹唐徳宗貞元二年正月罷元㑹為嵗饑也又貞元十八年正月朔以大雪罷元㑹又憲宗元和十一年正月朔不受元㑹以宿師於野也休假追逰為樂唐明皇開元二十五年詔旬節休假並不須入曹司任追勝為樂燒尾唐中宗景龍三年蘇瓌除右僕射舊例公卿大臣初拜官皆許獻食名曰燒尾宗晉卿謂瓌曰何不燒尾瓌奏中宗曰今粒食踴貴百姓不足臣不稱職所以不敢燒尾南曹檢覈唐志云員外郎一人掌判南曹謂在銓曹之南也每嵗選人考課必由之覈其實乃上三銓進申署焉小銓小選唐志云内外官吏則有假寧之節行李之命簿書景迹功賞殿最具員俱為員外分掌之郎中一人掌小銓亦分為九品通謂之行署以其在九流之外故曰流外銓亦曰小選其較試銓注與流内銓略同也雕印周儀二禮公穀二傳漢隠帝乾佑二年五月於國子監置也修唐書成晉少帝開運二年六月監國史劉昫張逺等修唐書二百三卷上之罪發觧官員後唐明宗長興三年詔選人文觧不合式罪發觧官員九經印板後唐明宗長興三年二月中書奏乞依石經文字刋九經書印版從之三銓為一銓後唐明宗天成四年十月併吏部三銓為一銓也置南曹唐文宗開成二年六月吏部奏長定選格請加置南曹郎中一人别置印一面從之三傳三史科唐穆宗長慶三年三月禮部奏請置三傳三禮科從之墨義唐徳宗貞元二年十二月禮部舉人試罷口義試墨義十條通典唐徳宗貞元十七年淮南節度使杜佑進通典凡九門二百卷帖經唐明皇開元二十五年三月勅令後明經帖十通五品已上口問大義十條取通六品已上仍答時務䇿三道取粗有文理者及進士停帖小經冝準明經例試大經十道通四然後從試雜文及䇿訖送中書門下詳覆兩都罷貢舉唐代宗永泰十年罷兩都貢舉皆集上都兩都舉選唐代宗寳應二年七月楊綰知東京選賈至知東都舉兩都分舉選自此始也制舉詩賦唐明皇天寳十三載八月上御勤政樓試四科制舉人䇿外加詩賦各一首自此始也不充鄉貢唐明皇天寳十二載七月詔舉人不得充鄉貢皆補學生四部書唐明皇開元盛時有四部諸庫書謂甲乙丙丁之次禮部掌舉人唐明皇開元二十四年三月始移考功貢舉遣禮部侍郎掌之開元禮唐明皇開元十四年五月進集賢院學士蕭嵩始奏起居舍人王仲邱撰成百十五卷名大唐開元禮二十年九月頒所司行用明經加帖進士試雜文唐高宗時侍御史劉思立遷考功員外郎始奏請明經加帖進士試雜文自思立始也國子監唐高宗龍朔二年正月初置國子監也頒五經正義於天下唐高宗永徽四年三月頒孔穎達五經正義於天下重撰晉書唐太宗貞觀十八年詔房喬禇遂良重撰晉書於是奏許敬宗來濟陸元仕劉子翼令狐法李義府薛元超上官儀八人分撰以臧榮緒書為諸晉書主參考諸家甚詳然多浮艷細碎為學者所譏唯李淳風天文之類最佳太宗自著宣武二年及陸機王羲之四論遂總題曰御撰凡一百三十卷周公孔子廟唐高祖武徳二年六月令國子監學立周公孔子廟四時致祭選部高等藍羅唐高祖太宗武徳貞觀初因隋制以吏部典選後人滋多判目近淺乃採經籍古義僻書隠言以試之唯恐選人之知通者謂之高等弱者謂之藍羅賜諸道公用糧草周世祖顯徳六年二月詔賜諸道公用糧草有差稅有省耗漢隠帝乾佑三年十一月平章事王章與郭威楊邠等聚斂太過時論非之時下令民稅每斛别輸二升名曰省耗百姓苦之估折支漢隠帝乾佑三年中宰臣王章與楊邠不善儒士郡官月俸皆以不甚資用者給之名曰雜閑物仍命高價估定旋又加之曰擡估尚未滿其意時更増之轉運判官後唐莊宗同光二年以劉審交為馬紹宏下轉運判官始此添蠶鹽錢増麴價後唐末清泰二年正月三司奏増添也發運判官晉高祖天福六年十二月兩浙錢元瓘卒史云元瓘起家先為鹽鐵發運判官也三司使後唐明宗長興元年八月始以許州節度使張延朗為兵部尚書充三司使也借京城富商錢唐徳宗建中三年四月太常博士韋都賓陳京以軍興庸調不足請借京城富商錢大率毎商留萬貫餘並入官不過一二十大富則國用濟矣誥下大索京城纔得八十萬貫又小尹韋禎巧法索之止及二百萬貫時判度支杜佑曰今用月費一百餘萬貫若獲五百萬貫纔可支給也鹽鐵兼轉運使唐代宗寳應元年以劉晏為户部侍郎京兆尹度支鹽鐵轉運使鹽鐵轉運自晏始也鄉里鄰保坊村唐高祖武徳七年令云百户為里五里為鄉四家為鄰五家為保在邑居者為坊在田野者為村諸道節帥進奉唐志云徳宗興元初克復京師後府藏盡虚諸道初有進奉以資經費復時有宣索其後諸賊既平朝廷無事常賦之外進奉不息韋皋劍南有日進李兼江南有月進杜亞揚州劉贊宣州王緯李錡浙西皆競為進奉以固恩澤貢入之奏皆曰臣於正税外方圓亦曰羡餘節度使或託密㫖乘此盜貿官物諸道有謫罰官吏入其財者减刻禄廩通津達道者税之蒔蔬藝果者税之死亡者税之節度觀察交代或先期税入以為進奉然十無其二三耳其餘没入此節度使進奉始也刺史進奉唐志曰徳宗興元初裴肅為常州刺史乃鬻貨薪炭案牘百賈之上皆親劑焉餘又進奉無幾遷浙東觀察使天下刺史進奉自肅始也判官進奉唐徳宗興元初宣州劉賛死判官嚴綬傾軍府資用進奉俄拜刑部員外郎天下判官進奉自綬始也揚擲米運唐志云明皇開元初每運米至京或砂礫糠粃雜乎其間詔使揚擲較其虚實揚擲之名自此始也捉官本錢收利唐明皇開元十八年先是高户捉官本錢後御史大夫李朝隠奏請薄税百姓一年税錢充之依舊令高戸及典正等捉月收利借官人税錢税竹木茶漆及常平事唐代宗永泰四年度支侍郎趙賛議常平事竹木茶漆盡税之税茶之説肇於此矣税茶法唐徳宗貞元九年户部侍郎張滂立税茶法曰諸於出茶州縣及茶山外商人要路委申定三等時估毎十税一移茶種植唐文宗太和元年王涯請使茶山之人移茶樹就官塲中栽之摘茶葉於塲中造之舊有貯積皆使焚棄天下怨之茶法壞唐文宗太和九年王涯誅後令狐楚以户部尚書右僕射主之以是年茶法大壞奏請付州縣而入其租於戸部人人悦之復舊茶法唐文宗開成元年李石以中書侍郎判收茶法復開元之制税間架算除陌唐徳宗時趙贊請税間架算除陌其法屋二價為間上等價毎間出錢二千中等一千下等五百或貧無他財獨守故業坐多屋出筭者動數十萬人不勝其苦匿一間者杖六十告者賞錢五十貫取於其家除陌法公私貿易一貫舊筭二十加等筭為五十給與他物或兩相易者約直為率筭之市牙各給印紙人買賣隨署記翌日合筭之有交易了用牙者給其私簿無私簿者投狀自奪其有隠錢百者没入二千杖六十告者十千取其家資法既行而主人市牙得専其柄率多隠盜公私所入曽不得半怨聲喧然至興元元年正月放罷已下失折納賖糶一條瓊林大盈庫唐徳宗興元元年賊泚平復府庫空虚後諸藩供奉繼至乃奉天行在貯官物於廊下題名曰瓊林大盈庫陸贄諫曰瓊林大盈自古悉無其制𫝊之耆舊之説皆云創自開元貢臣貪權飾巧求媚乃言郡邑貢賦所用盍各區分税賦當委於有司以給經用貢獻宜歸於天子以奉私求明皇悦之新是二庫蕩心侈欲禍萌於滋開元通寳錢唐高祖武徳四年鑄其文乃歐陽詢書也近事㑹元卷三
