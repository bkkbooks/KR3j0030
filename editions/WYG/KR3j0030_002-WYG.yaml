body:
  text: 近事㑹元卷二宋李上交撰學士𢎞文館麗正殿集賢殿北門翰林待詔翰林供奉翰林學士翰林志云唐高祖武徳初在秦府文學館擢杜如晦等十八人皆以本官兼學士學士自此始也分三畨更直宿閣下時謂之登瀛洲太宗貞觀初置𢎞文館學士政餘引入講論明皇置麗正殿學士後改為集賢殿書院學士亦草書詔後來翰林草書詔置學士集賢書詔乃罷初國朝修梁陳舊事有中書舍人六員専掌制誥雖曰禁省亦非宻切故温大雅魏徴等輩時召草制未有名號又乾封中始置北門學士睿宗朝初改為翰林待詔又改為翰林供奉至開元二十六年乃為學士别建學士院於翰林之南李白韓翊輩在舊翰林院雖有其名不職其事徳宗朝北翰林始兼學士之名大學士唐中宗景龍二年四月修文館増置大學士四員學士八員直學士十二員翰林院承㫖唐志天子在大明宫其院左右銀臺門内也在興慶宫其院在金明門内也西内院在顯福門也若在東都華清宫皆有待詔之所其待詔者有詞學經術合煉僧道卜祝術藝書奕各别院以廩之日晚而退其所重者詞學武徳貞觀時有温大雅魏徴輩永徽後有許敬宗等皆召入禁中驅使未有名目乾封中劉禕之等以文詞召入待詔常於北門候進止謂之北門學士天后時蘇味道輩皆待詔禁中中宗時上官昭儀獨當書詔之任睿宗時薛稷輩又當此任𤣥宗時張説等書詔謂之翰林待詔王者建極一日萬幾中外表䟽批荅或詔從中出宸翰所揮亦資其檢討謂之視草故常設當代四人以備顧問肅宗至徳已後天下用兵制詔皆從中出於是擇人命曰翰林學士充選者文士入禁中亦如中書舍人例置學士六人内擇年深徳重者一人為承㫖蓋以獨承宻命故也徳宗好文尤難其選貞觀已後為學士承㫖多至宰相乞廢翰林學士唐徳宗貞元初召呉通元充翰林學士與陸贄俱為上知時相嫌恨贄性褊急屢於上前短通元又言平時工藝書畫之徒待詔翰林本無學士祗自肅宗至徳後天子召集賢學士於禁中草書詔因在翰林院待進止遂以名奔播之時道路或預除改權令草制今四方無事制書分職宜歸中書舍人學士之名理須停寢贄以通元援引朋黨禁中叶力排已故欲廢之徳宗不許花磚八磚學士翰林志云學士院北㕔有花磚道冬中以日影及磚為入直之候李程性懶好晩入常過八磚乃至衆呼為八磚學士鈴索翰林志云學士院南北㕔外各有鈴索人不敢輒入也官誥㳂革命婦官誥用金花紙李愚翰林舊規云舊例宰相使相官用五色背綾金花紙節帥白綾金花紙命婦即金花綾紙唐昭宗乾寧二年十月李鋋自黔南節度授京兆尹兩度諮報中書使白綾紙也四禁翰林志云命書起草其禁有四一曰漏泄二曰稽緩三曰遺失四曰忘誤所以重王命也書詔印唐憲宗元和初置書詔印翰林學士院主之制名白麻白麻不使印雙日起草翰林志云凡赦書徳音立后建儲行誅討拜免三公宰相命將曰制並使白麻紙不使印也雙日起草隻日宣機務急速亦雙日書詔名白藤紙黄麻紙青藤紙五色翰林志云凡賜與徴召宣索處分曰詔使白藤紙凡慰撫軍旅曰書使黄麻紙並使印也道塲薦告詞文使青藤紙朱字謂之青詞凡諸陵薦告上表内道塲嘆道文並使白麻紙凡將相告身用金花五色綾紙其次小畨用五色麻紙並不使印改年為載唐明皇天寳三年正月改年為載浴堂金鑾坡唐徳宗雅尚文學學士輩又常詔對浴堂門移院於金鑾坡對御起草賦詩内相唐徳宗貞元十一年雖有宰相而謀猷參決多出於翰林學士陸贄時人目曰内相私臣貞元十一年翰林學士陸贄曰學士乃私臣元宗初令待詔唱和文章而已物議是之儤直翰林志云初入學士當直之數外更有儤直各有等第數目小三昧大三昧翰林志云學士毎下直出門相謔謂之小三昧出銀臺門乘馬謂之大三昧如佛之去纒縳而自在也内翰入院班次後唐明宗天成三年八月詔翰林學士依入院先後為班次唯承㫖必居班首後廢翰林學士院晉高祖天福五年八月廢翰林學士院併歸中書舍人端明殿學士後唐明宗天成元年五月以馮道趙鳯並充端明殿學士學士之始命也紫薇省黄門省唐明皇開元元年十二月改尚書左右僕射為左右丞相中書省為紫薇省門下省為黄門省改官名數司馬長史中臺西臺唐高祖武徳三年三月改納言為侍中内史令為中書令給事郎為給事中内史省為中書省太宗貞觀二十三年六月改民部尚書為户部尚書七月改治書御史為御史中丞改諸州治中為司馬别駕為長史治禮郎為奉禮郎高宗顯慶元年改户部為度支龍朔二年改尚書省為中臺中書省為西臺僕射為主政左右丞為肅機左右郎中為承務吏部為司列主爵為司封考功為司績禮部為司禮祠部為司禋膳部為司膳主客為司蕃户部為司元度支為司度倉部為司倉金部為司珍兵部為司戎職方為司城駕部為司輿庫部為司庫刑部為司刑都官為司僕比部為司計工部為司平屯田為司田虞部為司虞水部為司川尚書為太常伯侍郎為少常伯郎中為大夫侍中為左相黄門侍郎為東臺侍郎給事為中臺舍人散騎常侍為左右侍監諫議大夫為正諫大夫中書令為右相侍郎為西臺侍郎舍人為西臺舍人秘書省為蘭臺監為太史以少監為侍郎丞為大夫著作郎為司文郎太史令為祕書閣郎中御史臺為憲臺御史大夫為大司憲御史中丞為司憲大夫殿中省為中御府監為太監丞為大夫内侍監為内侍省太常為奉常光禄為司宰衛尉為司衛宗正為司宗太僕為司馭大理為詳刑鴻臚為司文司農為司稼太府為外府少府監為内府監將作監為繕工監國子監為司成館博士為宣業都水監為司津監洗馬為司經大夫家令寺為宫府寺至咸亨元年十二月詔新改官名並仰依舊文武部等及依舊唐明皇天寳十一載正月改吏部為文部兵部為武部至肅宗至徳二年十二月勅並依舊殿中省唐志云煬帝改殿中局為殿内省唐高祖武徳中改為殿中省龍朔改為中御府咸亨復改為殿中省袐書省唐志云𨽻中書之下漢代蔵書之所有延英閣廣内石渠之蔵又御史中丞在殿内掌蘭臺祕書圖籍後漢延熹二年始置監屬太常寺掌禁中圖書祕文後併入中書至晉恵帝則置祕書寺掌中外二閣圖書梁又改寺為省龍朔改為蘭臺光宅改為麟臺神龍中復為祕書省也有二局一曰著作一曰太史閣老曹長院長唐李肇國史補云兩省相呼為閣老尚書丞郎相呼為曹長員外郎御史拾遺相呼為院長諫官兼館職後唐明宗長興四年七月李愚奏以著作郎尹拙為左拾遺直史館諫官兼館職自拙始也把麻團句唐嘉話録云通事舍人宣詔舊例拾遺團句把麻者蓋謁者不知書多失句讀故用拾遺低聲摘句以助之及吕温為拾遺被喚把麻不肯去遂成故事拾遺不把麻自吕始也螭頭下記言事唐文宗太和九年十二月勅左右省起居賫筆研及紙於螭頭下記言事參酌院唐穆宗長慶初以刑法太重毎有司斷大獄又令給事中中書舍人參酌出入之百司呼為參酌院臺諫憎愛唐李肇國史補云諫院以章䟽之故憂患略同臺中則糾舉省中多士㫖趣不一故言遺補相惜御史相憎郎中相輕諸使職唐李肇國史補云開元已前於外則命使臣否則止自置八節度十採訪始有坐而為使者其後名號益廣於是有為使則重為官則輕故天寳末有佩印至三十者大厯中請俸有至千貫者今在朝太清宫太㣲宫度支鹽鐡轉知苑閑廏左右巡察監察館驛等使監倉監庫左右街外任則節度觀察諸軍押畨防禦團練經畧鎮遏招討𣙜鹽水陸運營田給納監收長春宫有時而置者則大禮禮儀㑹盟刪定三司黜陟巡撫宣慰推覆禮㑹冊立弔祭供軍粮料和糴以其大畧經置而廢者不録官内外悉謂之使舊為權臣所館州縣所理今屬中人者有之省眼南省舍人振行比盤都公唐李肇國史補云舊説吏部為省眼禮部為南省舍人考功度支為振行比部得廊下食以飯從者號比盤二十四曹呼左右司為都公拗項橋長安唐因話録云尚書省東南陽通衢有小橋相目為拗項橋言侍御史及殿中久次者至此必拗項西望南宫也氷㕔因話録云時呼祠為氷去聲㕔言其清且冷也御史七貴李肇國史補云御史故事大朝㑹則押班常參則殿中分班入閣則侍御史監奏蓋含元殿最逺用八品宣政其次用七品紫宸最近用六品殿中得立花磚緑衣用紫案褥之類號為七貴御史哄堂李肇國史補云凡御史上臺絶言笑有不可忍雜端大笑合坐皆笑謂之哄堂哄堂不罰御史臺門北開唐談賓録云御史臺門北開蓋取其肅殺就隂之義故京臺門北開矣按北都故事云御史臺在宫城西南其門北開又故城御史臺亦北開龍朔中置桂坊為東朝憲府門亦北開然北都御史臺門南開當時創造者不經反於故事同諸司蓋以權宜耶此說御史臺亦云爾又北開者或云此隋初移都之時兵部尚書李圓通兼御史大夫欲向省便之故開此門也五院唐尚書故實御史臺移自大夫已下至監察謂之五院也御史裏行唐太宗貞觀中馬周以布衣直門下省太宗命就監察御史裏行俄拜監察御史裏行始此御史中丞唐太宗貞觀中二十三年七月改治書為御史中丞宰相病坊給舍病坊監察御史病坊唐兩京記時以祕監為宰相病坊少監為給事中中書舍人病坊祕書丞及著作佐郎為監察御史病坊言從職不任繁劇者當改入此省然其職在圖史非復喧卑故凡好古君子厭趨競者亦求為之六軍將軍兼大夫唐代宗寳應元年授王仲昇為右羽林將軍兼御史大夫六將軍兼大夫自此始也郎中員外郎授刺史唐代宗永泰二年四月詔尚書省郎中授中州刺史員外郎授下州刺史内允内史舍人唐高宗永徽二年九月改太子中允為内允中書舍人為内史舍人太子賓客唐高宗顯慶元年正月以許敬宗為太子賓客賓客始有也十使巡察唐中宗景龍三年八月遣十使巡察天下司封唐明皇開元二十四年九月改尚書主爵為司封大理評事唐太宗貞觀二十二年十二月大理寺置評事殿前承㫖改為殿直宻院承㫖改為承宣晉高祖天福五年四月詔以承㫖名職嚴重除翰林承㫖外殿前承㫖改為殿直宻院承㫖改為承宣司天臺唐睿宗景雲二年自漢渾儀監改為太史監復為太史局乾元二年三月十九日勅改太史監為司天臺州别駕唐高宗永淳元年七月置員外判試檢校唐志云自則天中宗後始有之皆不佩魚同正員唐高宗永徽四年八月尚藥奉御蔣孝璋員外特置仍同正員員外同正員自蔣始也醫學唐太宗貞觀三年九月諸州置醫學醫博士唐明皇開元十一年九月天下諸州各置醫博士一人致仕給半禄料唐徳宗貞元五年四月以太子太師蕭昕為工部尚書致仕給半禄料永為長式初致仕官只給半禄無料上加之待老臣給半料自昕始也授官舉人自代唐徳宗建中元年正月詔常參官及諸道節帥已下至大理評事等授訖三日於四方館上表讓一人自代其外官委長吏附送表至中書門下毎官闕以舉多者授之食實封唐明皇開元十年十一月勅中書門下共食實封三百户自源乾曜張嘉貞始也致仕官在本品上唐太宗貞觀二年九月詔内外文武官年老致仕抗表去職者參朝之官宜在本品之上待漏院唐憲宗元和二年六月始置百官待漏院於建福門外籠街喝道唐文宗太和二年舒元褒上䟽云元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以崇高自大不思僭擬之嫌斜封唐睿宗景雲元年八月以中宗時官爵踰濫因依妃主墨勅而授官者時謂斜封禁之天䇿上將唐高祖武徳四年十月高祖以古舊官不稱秦王殊功乃别表徽號加天䇿上將節將封王唐明皇天寳九載五月封安禄山為東平郡王節將封王自此始也使相唐明皇天寳十五載六月授崔圓中書侍郎同中書門下平章事蜀郡長史劍南節度如故使相始此驃騎大將軍唐高宗顯慶七年九月初置驃騎大將軍官為從一品觀軍容使唐肅宗至徳中令魚朝恩監軍事九節度討安慶緒於相州郭子儀李光弼名齊功敵不立統帥以魚朝恩為觀軍容宣慰處置使觀軍容之名自朝恩始也元帥副元帥唐志天寳中安史之亂肅宗討賊以廣平王為天下兵馬元帥即代宗也又以郭子儀李光弼隨其方面副之號副元帥代宗即位又以雍王為之即徳宗也自後不置至昭宗以暉王爲之即哀帝也都統唐肅宗乾元中置之或總五道至上元末省至宣宗大中之後討徐州以康成訓討黄巢以荆南王鐸皆號為都統招討使唐徳宗貞元末置之其後隨用兵權置兵罷則停之防禦使團練使守捉使幕副唐肅宗至徳後中原置節度使又大都要害之地置防禦使治軍事刺史兼之不賜旌節至上元後改防禦使為團練守捉使又與團練使兼置防禦使名前使各有副使判官皆天寳後置唐志曰親王總戎曰元帥文武總統曰總管以奉使言之則曰節度使若大使旌節置木契以行元宗天寳中縁邊禦戎之地置八節度使受命之日賜之旌節謂之節度使得以専制軍事行則建節封纛外任之重無踰此焉有副使一人行軍司馬一人判官二人掌書記一人參謀無員數皆天寳後置之中原則無塞上有也神䇿軍宦官主兵唐昭宗天復三年宰相崔𦙍奏曰高祖太宗承平時無内官與軍旅自天寳已後宦官寖盛貞元元和分羽林衛為左右神䇿軍以便衛從令宦官主之唯以二千人為定制自是參掌機宻遂至内務百司皆歸宦者上下彌縫共為不法都部署後唐末清泰三年五月三日夔州張景達落副總管充西北畨馬步都部署始此也刺史治軍軍鎮名節度額觀察唐志曰肅宗至徳之後中原用兵刺史皆治戎軍遂有防禦團練制置之名要衝大郡皆有節度之額冦盜息則易以觀察之號也觀察使奏刺史唐文宗太和三年十一月赦文刺史分憂得以専達事有違法觀察使然後奏聞左右千牛唐高宗顯慶五年三月始有左右千牛近事㑹元卷二
