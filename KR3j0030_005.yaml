body:
  text: 近事會元卷五宋李上交撰婦人乘簷子及禁斷唐高宗咸亨二年敕曰百官家口咸預士流至於衢路之間豈可全無障蔽婦人比來多著帷帽遂棄羃帷曽不乘車别坐簷子遞相倣效浸成風俗過為輕率深失禮容理須禁斷兜籠唐志巴蜀婦人多有肅宗乾元已來以兜籠易於簷負京城奚車兜籠代於車輿矣奚車似今之坐車耳婦人線鞾線鞋唐高祖武德已來婦人著履視制亦重又著線靴開元以來例著線鞋取輕妙便於事昏娶親迎舉樂障車唐志云太極元年左司郎中唐紹上疏云親迎之儀備諸六親當須昏以為期詰朝謁見往者下俚庸鄙時有障車邀其酒食以為戲樂近日此風轉盛上及王公乃廣奏百樂多集徒侣遮擁道路障車禮貺過於聘財歌舞喧譁殊非助感請禁之公主事舅姑唐太宗貞觀十一年王圭子欽直尚南平公主時廢公主事舅姑之禮圭曰主上欽明動修法制吾受公主謁見豈為身榮欲成國家之美耳遂與妻就席坐令公主親行盥饋之禮而退自此成風自圭始也公主賜諡唐德宗貞元十五年七月故唐安公主賜諡曰莊穆自此始也貴妃唐明皇天寶三載八月册太真妃楊氏為貴妃始也夾寨夫人後唐莊宗天佑五年五月破夾寨於潞州得符道昭妻侯氏有才色時稱夾寨夫人會昌山唐明皇天寶元年改驪山為會昌山始也后土祠漢武時舊有后土祠隳廢至唐明皇再修之按傳記云后土祠隔河與梁山泊相望舊立山神像以配坐如妃匹焉至開元中始别建室而遷出之燕公張説為之記俗傳安道者淫怪尤甚焉封諸山為公唐明皇天寶十載封沂山為東安公會稽山為永興公吳山為成德公霍山為聖應公醫巫閭山為廣寧公已上並三月十七日一時禮册者也吳山為西嶽唐肅宗至德二年春改吳山為西嶽改嶽山名唐肅宗上元中聖躬不康術士請改吳山為華嶽華嶽為泰山華州為泰州華隂縣為泰隂縣寶應元年復舊封四海為王唐明皇天寶十載正月封東海為廣德王南海為廣利王西海為廣潤王北海為廣澤王封四瀆為公唐明皇天寶六載河瀆封靈源公濟瀆為清源公江瀆為廣源公淮瀆為長源公文宣王兖國公唐明皇開元二十七年贈孔子為文宣王顔回為兖國公五嶽封王唐明皇先天二年三年封華山神為金天王至開元十二年封太山神為天齊王天寶五載封中嶽為司天王北嶽為安天王天下減廢佛寺及僧武宗會昌五年併省天下佛寺減僧教銅像鐘磬納官鑄錢鐡像置農器由是天下拆寺四千五百餘所還俗僧尼二百六萬五百收充兩稅户拆招提蘭若四萬餘所收膏腴上田數千萬頃收奴婢為兩稅户十五萬人𨽻僧尼屬主客顯明外國之教敕大秦穆護杖二千餘人還俗不雜中華之風也再廢寺周世宗顯德二年四月諸州廢寺三千六百三十六所佛骨唐憲宗元和十四年正月上令中使杜英竒押宫人三十名赴臨皋驛迎鳯翔法門寺塔有釋迦佛指骨一節入內時刑部侍郎韓愈上書諫之道士𨽻宗正寺唐明皇開元二年五月詔改僧尼拜父母唐明皇開元二年閏二月令道士女冠僧尼致拜父母國忌行香齋僧晉高祖天福五年二月國忌日宰臣跪爐百官依班序立每忌日飯僧百人永為定式始也關節唐穆宗長慶元年四月詔云文學之科聞近日浮薄之徒扇為朋黨謂之關節干擾主事厯日板唐文宗太和九年十二月敕諸道州府不得私置厯日板霍錐唐懿宗咸通十年龎勳據徐州有衆二萬男子十五已上皆令執兵其人皆野鋤鈎為兵號霍錐拂菻狗唐高祖武德七年高昌國士麯文泰獻狗雌雄各一髙六寸長尺餘性甚慧云出拂菻國中國有拂菻狗自此始也上元點燈唐志曰睿宗好樂元宗又善音律先天二年正月望胡僧婆隨請夜開門燃百千燈睿宗宴喜門觀樂凡四日市賣白望唐德宗貞元十三年宦者主宫中市買謂之宫市抑買人物但稱宫市則斂手付真偽不辨搗蒜後唐閔帝初秦雍間令長設酒食私丐於部民俗謂之搗蒜及清泰初安重誨為京兆尹之鎮長安亦為之秦人曰日為搗蒜老者詳之蓋語訛耳乃倒算是也晉少帝敗晉少帝開運四年正月為契丹所劫蒙塵於封禪寺也茶神唐傳載云時有鬻茶之家陶為陸羽之像置於煬器之間云宜茶足利也因目之曰茶神有交易則以茶祭無則以釡湯沃之玉樹唐傳記云雲陽界多漢離宫故地至唐有樹似槐而葉細土人謂之玉樹玉樹青蔥左思賦有之或非其語過蓋不知此樹也華夷圖唐德宗貞元十七年宰臣賈耽上海內華夷圖繁臺音婆吹臺汴州之南有地名曰繁臺梁開平二年七月改為講武臺本梁王吹臺也因繁氏居之打夜狐唐敬宗寶厯二年十一月帝好深夜自捕狐狸宫中謂之打夜狐甘露事唐文宗太和元年十一月李訓鄭注謀宦官詐言金吾仗舍石榴樹有甘露請上觀之致亂立獸炭唐代宗大厯十四年五月德宗即位至十月九成宫貢立獸炭爐木芍藥唐松窗雜録云開元禁中初重木芍藥即牡丹也蓋禁中呼之耳跳脫盧氏雜説云唐文宗問宰臣云古詩云輕衫襯跳脫跳脫是何物也宰臣未對上曰即今之腕釧也真誥言安妃有斷粟金跳脫是臂飾也廢散從親事官周太祖廣順元年三月詔廢諸州散從親事官公私便之諡先生唐志云養德丘園聲實明著則諡曰先生大行大名之小行小名之鄭州僕射陂後唐明宗天成二年十一月詔册故僕射李靖為太保改鄭州僕射陂為太保陂及後魏李文賜僕射李靖沖因以為名今改之誤也天樞唐則天長夀三年八月斂東都銅鐡鑄天樞於端門之外至明皇開元二年九月詔毁之律十二卷唐太宗貞觀六年房元齡等定律五百條分為十二卷也格十八卷唐貞觀十一年刪武德貞觀以來敕格三千餘件定留七百條各格十八卷式二十卷唐明皇開元時式二十卷前朝多少不定也肆赦唐志云肆赦之日武庫令設金雞及鼓於宫城門之外右勒囚徒於闕前撾鼓千聲訖宣詔為釋之赦書唐志云赦書頒諸州用絹寫行天下匭唐則天垂拱初年鎔銅為匭四面置門各依方色共為一室東面曰延恩匭上賦頌求官爵考封表者投之南面曰招諫匭有言時政得失及直諫諍者投之西南曰申寃匭有陳得罪寃濫者投之北面曰通元匭有元象災變及軍謀祕䇿投之每日置於朝堂以次監收表疏既出之後不逞之徒或至攻訐隂私謗訕朝政者後令中書門下官一人専監其狀仍責職官然後許封進行之始也刑統周世宗顯德五年七月中書進新刪定大周刑統律令唐高祖武德七年始定律令鬭競律唐憲宗元和二年八月刑部奏改律第八卷為鬭競律也禁選人帶京債許借料錢唐武宗會昌二年二月中書奏赴選官人多京債到任填還致其貪求罔不由此今年三銓於逺官許連狀相保户部各保量加給料錢衣食稍足可責清亷從之州縣官禁部民接坐後唐明宗長興二年九月詔天下州縣官無與部民接坐死罪五覆奏唐太宗時河內人李好德素有風狂而語涉妖妄時直中書省張蘊古究其獄實癲病有徴法不當坐太宗始令斬蘊古於東市尋悔之因發敕凡決死罪皆令所司五覆奏藴古始也斷獄禁樂唐太宗貞觀五年七月初令天下決死刑日上進蔬食內教坊太常不舉樂也逐旬問罪人後唐明宗天成二年正月詔長史逐旬問罪人以杜枉濫也赦書一本在內唐文宗開成元年赦畢上曰朕務行實不欲崇長空文宰臣李石奏曰赦書須內一本陛下時看之表狀書奏制唐明皇先天二年正月制敕表狀書奏箋牒每月等數作一十二十三十四十字制敕用黃紙唐高宗上元三年二月敕制比用白紙多為蟲蠧令後尚書省下諸司州縣宜並用黃紙沙門島漢隱帝乾祐三年正月罪安友視坐失城也友視為永興節度副使不能防守致趙思綰之奔衝至是流登州沙門島始也配衙前安置後唐末帝清泰元年十月罪興州刺史馮暉坐屯乾渠為蜀人來侵奔歸鳯翔配同州衙前安置自此始也貶崖州唐中宗神龍六年六月浪州刺史平陽郡王敬暉貶崖州司馬自此始也盜殺武元衡陽傷裴度唐憲宗元和十年六月鎮帥王承宗遣盜夜伏靖安坊刺宰相武元衡死之又於通化坊刺中丞裴度傷首不死貶李德裕唐宣宗大中元年七月貶李德裕潮州司馬員外安置二年九月再貶崖州司户至其年十二月死於崖州也吳元濟唐德宗時先是吳少陽本滄州人與吳翔者相善翔子少誠知淮西留後乃以金帛取少陽至名為堂弟置為軍職充申州刺史五年少誠病因家童蔣以少誠意召少陽至少誠已困乃偽置少陽攝副使知軍州遂告少誠死之少陽自為留後爾後少陽據蔡五年不朝憲宗元和九年卒子元濟僭襲逆命却略近郡邑千餘里關東大恐九年十月以李光顔為忠武節度光蔡等州招撫使十年正月詔奪元濟在身官五月裴度經制屢戰不已至十二年裴度得賊帥吳秀琳李佑因委信國計其年將臣李訴十一月率兵於十日夜越牆而入十一日擒元濟并家屬赴京斬於獨栁樹下年二十五自少誠阻兵已來三十餘年也黃巢唐僖宗乾符四年四月宛朐賊黃巢聚萬人起攻鄆州陷之至中和四年六月鄆州宋闕奏敗巢於合鄉七月巢將林言斬巢黃揆秉三人降也安祿山唐明皇天寶十四載十一月安祿山反於范陽至肅宗至德二年正月五日為嚴莊李豬兒斫腹死朱泚唐德宗建中四年十月涇軍亂迎朱泚及至興元元年李晟渾瑊等破賊泚走至平原為幽州軍士韓旻斬泚秦宗權唐僖宗光啓三年六月蔡州刺史秦宗權敵黃巢將孟楷退敗遂與通和文德元年昭宗即位後十二月蔡州牙將申叢執宗權撾折其足拓跋思恭即元昊之祖也昔赫連勃勃後魏道武末僭稱大夏天王自云徽赫與天連又號其支庶為鐡伐氏言鋼鋭如鐡可以伐人蒸土築城號曰統萬言統領衆多也自赫連築城已來頻於關右為患連延至唐僖宗朝有拓跋思恭鎮夏州討黃巢有功賜姓李名石卒有拓跋仁福為畨部都指揮使亦從其姓梁開平初將吏立仁福為帥卒子彛殷繼為帥世有綏宥銀夏靜五州彛殷仕周為定難軍節度使封西平王皇朝建隆元年賜名彛興至乾德五年九月卒贈太師其子先睿襲位太平興國中卒其子繼筠襲位繼筠卒弟繼捧襲位繼捧以昆弟不睦乞留京師於是歸者數人皆别爵也唯克文者依舊知夏州乾德九年夏州掩襲背逆者繼遷繼遷遁去獲其母妻之屬羊馬甚多繼遷乃繼捧弟也端拱元年授繼捧節度使賜姓趙氏名保忠端拱二年繼遷偽順尋賜官及姓趙氏名保吉爾後纍為邉患真宗即位繼遷遣使修貢亦偽順也景德元年二月鄜延路奏繼遷於去年十二月劫西畨王涼府為潘羅支詐降集六國畨部合擊敗之繼遷中流矢至靈州界三十里死其子阿移尚幼即德明也稱臣乞歸順云保吉遺令也時景德三年九月授德明夏州節度使封西平王至明道元年十一月進封夏王是月德明薨制授德明子元昊節制封西平王寶元元年十一月元昊進奉南郊人不至十二月遣人上表納旌節自陳僭竊事近事會元卷五
