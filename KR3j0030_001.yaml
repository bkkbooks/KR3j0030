body:
  text: 近事會元卷一宋李上交撰太極殿唐高祖於隋義寧二年五月受隋禪改大興殿為太極殿翠微宫長安夲太和宫唐太宗貞觀二十一年四月營太和宫於終南山尋改為翠微宫玉華宫坊州唐太宗貞觀二十一年七月建玉華宫於坊州宜君縣之鳯皇谷玉華寺唐高宗永徽二年廢玉華宫為玉華寺八關宫合璧宫雒陽唐高宗顯慶五年四月造八關宫於東都苑內五月復改為合璧宫天宫寺洛陽唐高祖濳龍時舊宅蓬萊宫洛陽唐高宗龍朔二年四月造乾元殿雒陽唐高宗麟德二年三月造紫桂宫雒陽唐高宗儀鳯四年五月造於沔池之西龍尾道含元殿長安唐高宗咸亨元年三月改長安蓬萊宫為含元殿側有龍尾道自平階至地凡詰曲七轉曰丹鳯門北望宛如龍尾下埀於地焉兩垠欄悉以青石為之至今石柱猶有存者萬年宫九成宫長安唐高宗永徽二年九月改九成宫為萬年宫集賢殿麗正殿集賢殿書院長安唐明皇開元十三年四月改集仙殿為集賢殿改麗正殿書院為集賢殿書院廣花萼樓勤政樓築夾城芙蓉園長安唐明皇開元二十年六月長安廣花萼樓前面題曰勤政樓又築夾城芙蓉園太清宫亳州唐明皇天寶二年九月敕譙郡紫極宫宜準西京為太清宫觀風樓長安唐明皇天寶八載四月於華清宫作觀風樓再廣長安夾城長安唐德宗貞元十二年八月廣夾城華清宫溫泉宫長安唐明皇天寶六載十月改溫泉宫為華清宫紫極宫唐明皇天寶二年諸州置紫極宫集靈臺長生殿長安唐明皇天寶元年十月新成長生殿名曰集靈臺以祀天神也明皇歸西內興慶宫長安唐肅宗上元元年七月上皇自興慶宫移歸西內李輔國遷之興慶宫即南內也延英殿唐傳載云肅宗以苗晉卿年老艱步故設之也後來臣僚得詣便殿多以私自集希求恩寵欲進其身以此為望焉都亭驛上元驛汴晉高祖天福五年八月改東京之上元驛為都亭驛至德宫雒陽後唐明宗天成元年六月以舊宅為至德宫紫宸殿萬嵗殿周世宗顯德六年十二月改內萬嵗殿為紫宸殿改宫殿門名雒陽唐哀宗天祐二年五月延喜門改為宣仁門重明門改興教門長樂門改光政門光範門改應天門應天門改為乾元門宣政門改為敷政門宣政殿改為貞觀殿日華門改為左延福門月華門改為右延福門萬夀門改為萬春門積善門改為興善門含章門改為膺福門含清門改為延義門金鸞門為千秋門延和門為彰善門帝王服赤黃袍衫唐太宗貞觀中制翼善冠朔望視朝以常服及白練裙襦通著之若服袴褶又與平巾幘通用著於令其常服赤黃袍衫折上頭巾九環帶六合靴皆起自魏周便於戎事貞觀己後非元日冬至受朝及大祭皆常服而已志云中宗景龍二年七月太子左庶子劉子元進議曰燕服蓋古之褻服也今亦謂之常服江南則以巾褐裙襦北朝則雜以戎衣之制爰自北齊有長帽短鞾合袴襖子朱紫元黃各任所好雖謁見君上出入省寺若非元正大會一切通用高氏諸帝嘗服緋袍隋代帝王貴臣多黃服文綾袍烏紗帽九環帶烏皮六合靴百官常服同於匹庶皆著黃袍出入殿省天子朝服亦如之惟帶加十三環以為差異蓋取其便事其烏紗帽漸廢貴賤通服折上巾其制周武帝建德年所造也晉公宇文護始命袍加下襴及大業元年煬帝始制詔吏部尚書牛𢎞等憲章古則創造衣冠自天子逮於胥吏章服皆有等差始令五品以上通服朱紫已後用兵及車駕行幸百官雖服袴褶而軍間不便六年復詔從駕逺者皆戎衣貴賤異等雜用五色五品已上通著紫袍六品已下兼用緋緑胥吏以青庶人白屠商皂士赤黃武德初因隋舊制天子燕服亦名常服唯以黃袍及衫後漸用赤黃遂禁士庶不得以赤黃為衣服雜飾幞頭帽子腰帶靴公服右五事上官詳前帝王服色赤黃之説下文幞頭乃烏紗帽耳當時必垂其帽之餘者故前説云漸廢是廢其制度也又云貴賤通服折上巾只是以其帽之餘帛折而上繫之俗謂幞頭小腳以便事也似謂無巾子時為帽冒其頭也有巾子時為巾也今之小紗帽子者亦似因幞頭而生其制又去其巾子耳何者其帽之餘帛亦折而上綴之俗曰帽簷是也腰帶乃是九環十三環帶也言環即今之帶上金玉等名具也俗曰袴具言在袴具之上有眼目曰左眼是不忘其本存古之環象也環以佩魚龜算袋等也鞾即六合鞾也以六片縫合而成公服即宇文護加襴之袍也笏唐高祖武德四年八月敕五品已上象笏三品已上前挫後直五品已上前挫後屈自有唐已來一例上員下方曽不分别六品已下執竹木為笏上挫下方手巾算袋刀子礪石韘韘唐高宗上元元年八月制凡一品已下並帶之武官欲帶者聽之睿宗景雲元年七月詔一品已下帶手巾算袋其刀子礪石等不許佩武官五品已上佩韘韘七事七事謂佩刀刀子礪石契苾真噦厥針筒火石袋等也開元初復罷之幞頭巾子唐制云武德已來始有巾子文官名流尚平頭小樣者則天朝貴臣內賜高頭巾子呼為武家諸王樣中宗景龍四年三月因內宴賜宰臣已下內樣巾子開元以來文官仕任多以紫皂官絁為頭巾平頭子相效為雅製開元十九年十月賜內供奉官及諸司長官羅頭巾及宫樣巾子迄今服之也今宋朝所謂頭巾乃古之幅巾賤者之服非此所論者也金銀銅魚袋龜袋特進佩魚散職佩魚唐高宗永徽二年五月開府儀同三司及京官文武職事四品五品並給隨身魚袋至咸亨三年五月五品已上賜新魚袋並飾以銀三品已上各賜金袋刀子礪石至垂拱二年正月諸州都督刺史並準京官帶魚袋至天授元年九月改內外所佩魚作龜久視元年十月職事三品已上龜袋並用金飾四品用銀飾五品用銅飾上守下行皆從官給神龍元年內外官五品已上依舊魚袋六月嗣王郡王特許佩金魚袋景龍三年八月令特進佩魚散職佩魚自此始也自武德已來皆從正員帶闕官始佩魚袋員外判試檢校自則天中宗後始有之皆不佩魚雖正員官得佩亦去任及致仕即解去魚袋至開元九年張嘉貞為中書令奏諸致仕許終身佩以為榮寵以理去任亦聽佩魚袋自後恩制賜賞緋紫例兼魚袋謂之章服因之佩魚袋服朱紫者甚衆改銅魚袋唐則天嗣聖元年詔五品佩銅魚袋中宗返正從舊佩龜唐則天天授元年九月改內外官所佩魚作龜乘輿案褥牀帷用赤黃唐明皇天寶六載禮儀使太常卿韋縚奏舊用紫今請依御袍赤黃色敕從之銀菟符隋義寧二年三月封唐祖為相國總百揆四月停竹使符頒銀菟符於郡國銀魚符唐高祖武德元年九月改銀菟符為銀魚符笏囊唐傳云故事皆搢笏於帶而後乘馬開元二十四年宰相張九齡體羸常使人持之因設笏囊笏囊之設自九齡始也腰輿唐則天神功元年幸萬安山玉泉以山徑危欲御腰輿而上以王慶諫而止皇親禁人出入掖庭唐明皇開元十年九月禁諸王公主駙馬外戚家除非至親以外不得出入門庭妄説言語親試舉人唐高宗顯慶四年二月上親試舉人凡九百人內五百人登上第真宰相唐高祖武德初至長安四年已前僕射並是真宰相専知樞密唐太宗貞觀十六年正月岑文本為中書侍郎専知樞密知門下省唐太宗貞觀十六年鄭國公魏徴為太子太師知門下省事同中書門下三品唐太宗貞觀十七年三月以兵部尚書英國公李績為太子詹事同知中書門下三品參預朝政唐太宗貞觀十八年八月以刑部尚書張亮參預朝政左右相唐明皇天寶元年二月侍中為左相中書令為右相宰相以平章事為名唐高宗永隆二年以中書侍郎郭正一與魏待舉並同中書門下平章事此官自正一始也參知機務唐太宗貞觀二十二年正月以崔仁師為中書侍郎參知機務僕射始帶同中書門下唐太宗貞觀二十三年高宗嗣位至七月以李績為尚書右僕射同中書門下三品參知政事唐高宗顯慶四年五月以兵部尚書任雅相度支尚書盧承慶並參知政事平章事唐高宗永淳二年四月上謂參知政事崔知溫曰郭正一魏待舉等厯任尚淺且令預聞政事未可與卿等同名稱自是外司四品已下知政事者遂以平章事為名文昌臺鸞臺鳯閣左右肅政臺唐則天光宅元年九月改尚書省為文昌臺左右僕射為文昌左右相吏部為天官户部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官門下省為鸞臺中書省為鳯閣御史臺為左肅政臺専知京師百官及監諸軍旅並承詔出使更置右肅政臺専知諸州按察鸞臺侍郎都臺麟臺控鶴唐則天埀拱元年二月改黃門侍郎為鸞臺侍郎文昌都省為都臺祕書省為麟臺左右監門率府為控鶴禁衛率府至神龍二年二月詔並卻依舊依永淳已前官名賜宰臣生日器幣晉少帝天福六年七月賜宰臣馮道生辰器幣道辭以幼失父母不記生日堅讓不受生辰賜物始此也前八司唐志云吏兵禮部考功都省御史臺中書門下謂之前八司其餘則曰後行中書草制唐憲宗元和八年罷朔方靈鹽節度使王佖為右衛將軍凡將相出入翰林草制謂之白麻至佖責罷中書草制因為例也沙堤長安唐李肇國史補云拜宰相禮絶班行府縣填路自私第至於子城東街名沙堤火城李肇國史補曰宰相元日冬至立仗太官皆備珂繖列燭有五六百炬謂之火城宰相將至則皆滅以避宰相也兩省四孔炙宰相判官屧腳撻額裹頭唐盧氏雜説云諫議無事不入宰相每遇入省有厨食四孔炙中書舍人時謂宰相判官宰相親嫌不拜知制誥為屧腳又云不由三省直押中書舍人者謂之撻額裹頭時政記唐則天長夀二年姚璹奏以為帝王謨訓不可暫無記述若不宣自宰相百官無從得書乃表請仗下所言軍國政要宰相一人専知撰録號曰時政記每日封送史館宰相之撰時政記自璹始也堂老李肇國史補云宰相呼為堂老政事堂唐志云舊制宰相常於門下省議事謂之政事堂故長孫無忌房魏輩以他官兼政事者皆云門下省事𢎞道初裴炎為中書令執朝政始移政事堂於中書省內樞密使唐宣宗大中十一年七月以飛龍使宫闈局令王歸長守內侍省內侍知省事充內樞密使自此始也崇政院梁太祖開平元年以敬翔檢校司空改樞密院為崇政院以翔知院事廢樞密院晉高祖天福四年四月先是桑維翰免樞機之務以劉處讓代之奏議多不稱旨俄而處讓丁母憂因以其印付中書樞密院由是遂廢乞復置樞密院晉高祖天福七年六月崩少帝登位至其年七月宰臣馮道等表請復置樞密院初高祖之事後唐也覩安重誨秉政賞罰由已常惡之及即位鋭意廢罷一委中書至是道等倦繁劇乞置不允近事會元卷一
